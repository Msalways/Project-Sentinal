<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Assessment Report — {{targetUrl}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242736;
      --border: #2d3140;
      --text: #e1e4eb;
      --text-dim: #8b8fa3;
      --accent: #6366f1;
      --critical: #ef4444;
      --high: #f97316;
      --medium: #eab308;
      --low: #22c55e;
      --info: #3b82f6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 48px 24px; }
    header {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 2px solid var(--border);
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    header .meta {
      color: var(--text-dim);
      font-size: 14px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    header .meta span { display: inline-flex; align-items: center; gap: 6px; }
    header .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-html { background: #6366f1/15; color: var(--accent); border: 1px solid var(--accent); }
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    section h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    section .tools {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    section .tools code {
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--accent);
    }
    section .output {
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    section .output :is(h1, h2, h3, h4) {
      color: #fff;
      margin: 16px 0 8px;
    }
    section .output h3 { font-size: 15px; font-weight: 600; }
    section .output strong { color: #fff; }
    section .output code {
      background: var(--surface-2);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    section .output pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    .finding-critical,
    .finding-high,
    .finding-medium,
    .finding-low { padding: 2px 8px; border-radius: 4px; font-weight: 500; font-size: 12px; }
    .finding-critical { background: #ef4444/15; color: var(--critical); }
    .finding-high { background: #f97316/15; color: var(--high); }
    .finding-medium { background: #eab308/15; color: var(--medium); }
    .finding-low { background: #22c55e/15; color: var(--low); }
    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    footer {
      text-align: center;
      padding: 32px 0;
      color: var(--text-dim);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
    @media (max-width: 640px) {
      .container { padding: 24px 16px; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Security Assessment Report</h1>
      <div class="meta">
        <span>🎯 {{targetUrl}}</span>
        <span>📅 {{date}}</span>
        <span class="badge badge-html">HTML</span>
      </div>
    </header>

    {{sections}}

    <footer>
      Generated by Ultimatrix Security Assessment &mdash; {{date}}
    </footer>
  </div>
</body>
</html>
