<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimatrix Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --blue: #58a6ff;
  --critical: #f85149;
  --high: #d29922;
  --medium: #58a6ff;
  --low: #8b949e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background:var(--bg); color:var(--text); height:100vh;
  display:flex; flex-direction:column;
}
header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
}
header h1 { font-size:16px; font-weight:600; }
header .target-info { font-size:13px; color:var(--text-muted); }
.risk-badge {
  display:inline-block; padding:2px 10px; border-radius:12px;
  font-size:12px; font-weight:600;
}
.main { display:flex; flex:1; overflow:hidden; }
.left-panel {
  width:380px; min-width:380px; display:flex; flex-direction:column;
  border-right:1px solid var(--border); overflow-y:auto;
}
.stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:12px;
}
.stat-card .stat-value { font-size:24px; font-weight:700; }
.stat-card .stat-label {
  font-size:11px; color:var(--text-muted);
  text-transform:uppercase; letter-spacing:0.5px;
}
.findings-breakdown { padding:0 12px 12px; }
.findings-breakdown h3 {
  font-size:12px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;
}
.finding-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:13px; }
.finding-row .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.finding-row .critical { background:var(--critical); }
.finding-row .high { background:var(--high); }
.finding-row .medium { background:var(--medium); }
.finding-row .low { background:var(--low); }
.workflow-panel { padding:12px; flex:1; }
.workflow-panel h3 {
  font-size:12px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;
}
.workflow-graph {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:12px; font-family:'Courier New',monospace; font-size:12px;
  line-height:1.6; min-height:100px; white-space:pre-wrap;
}
.right-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.log-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.log-header {
  padding:8px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.log-header h3 { font-size:12px; text-transform:uppercase; color:var(--text-muted); }
.log-header label {
  font-size:12px; display:flex; align-items:center; gap:4px;
  color:var(--text-muted); cursor:pointer;
}
.log-content {
  flex:1; overflow-y:auto; padding:8px 12px;
  font-family:'Courier New',monospace; font-size:12px; line-height:1.6;
}
.log-entry { padding:2px 0; border-bottom:1px solid rgba(48,54,61,0.3); }
.log-entry .time { color:var(--text-muted); margin-right:8px; }
.type-badge {
  display:inline-block; padding:0 4px; border-radius:3px;
  font-size:11px; font-weight:600; margin-right:6px;
}
.log-entry.navigate .msg { color:var(--blue); }
.log-entry.finding .msg { color:var(--orange); }
.log-entry.tool_call .msg { color:var(--green); }
.log-entry.error .msg { color:var(--red); }
.badge-navigate { background:rgba(88,166,255,0.15); color:var(--blue); }
.badge-finding { background:rgba(210,153,34,0.15); color:var(--orange); }
.badge-tool_call { background:rgba(63,185,80,0.15); color:var(--green); }
.badge-error { background:rgba(248,81,73,0.15); color:var(--red); }
.badge-model_update { background:rgba(139,148,158,0.15); color:var(--text-muted); }
.badge-risk_change { background:rgba(210,153,34,0.15); color:var(--orange); }
.badge-session { background:rgba(139,148,158,0.15); color:var(--text-muted); }
.badge-status { background:rgba(139,148,158,0.15); color:var(--text-muted); }
.badge-screenshot { background:rgba(88,166,255,0.15); color:var(--blue); }
.screenshot-panel {
  border-top:1px solid var(--border); padding:8px 12px; max-height:200px; overflow:hidden;
}
.screenshot-panel h3 {
  font-size:12px; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;
}
.screenshot-panel img {
  max-width:100%; max-height:160px; border-radius:4px; border:1px solid var(--border);
}
footer {
  background:var(--surface); border-top:1px solid var(--border);
  padding:8px 20px; display:flex; align-items:center; gap:12px; font-size:13px;
}
.conn-dot {
  width:10px; height:10px; border-radius:50%; display:inline-block; transition:background .3s;
}
.conn-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); }
.conn-dot.off { background:var(--red); box-shadow:0 0 6px var(--red); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Ultimatrix Dashboard</h1>
    <div class="target-info" id="targetInfo">Waiting for target...</div>
  </div>
  <span class="risk-badge" id="riskBadge" style="background:rgba(139,148,158,0.15);color:var(--text-muted)">Risk: --</span>
</header>

<div class="main">
  <div class="left-panel">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="statFindings">0</div>
        <div class="stat-label">Findings</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statRiskScore">--</div>
        <div class="stat-label">Risk Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statEndpoints">0</div>
        <div class="stat-label">Endpoints</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statWorkflowNodes">0</div>
        <div class="stat-label">Workflow Nodes</div>
      </div>
      <div class="stat-card" style="grid-column:span 2">
        <div class="stat-value" id="statMacros">0</div>
        <div class="stat-label">Recorded Macros</div>
      </div>
    </div>

    <div class="findings-breakdown">
      <h3>Findings by Severity</h3>
      <div class="finding-row"><span class="dot critical"></span> Critical: <strong id="fCritical">0</strong></div>
      <div class="finding-row"><span class="dot high"></span> High: <strong id="fHigh">0</strong></div>
      <div class="finding-row"><span class="dot medium"></span> Medium: <strong id="fMedium">0</strong></div>
      <div class="finding-row"><span class="dot low"></span> Low: <strong id="fLow">0</strong></div>
    </div>

    <div class="workflow-panel">
      <h3>Workflow Graph</h3>
      <div class="workflow-graph" id="workflowGraph">No nodes yet...</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="log-panel">
      <div class="log-header">
        <h3>Live Event Log</h3>
        <label><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
      </div>
      <div class="log-content" id="logContent"></div>
    </div>

    <div class="screenshot-panel" id="screenshotPanel" style="display:none">
      <h3>Latest Screenshot</h3>
      <img id="screenshotImg" alt="Screenshot">
    </div>
  </div>
</div>

<footer>
  <span class="conn-dot off" id="connDot"></span>
  <span id="statusText">Disconnected</span>
  <span style="flex:1"></span>
  <span style="color:var(--text-muted);font-size:12px" id="eventCount"></span>
</footer>

<script>
const ws = new WebSocket(`ws://${location.host}/ws`);
const logContent = document.getElementById('logContent');
const autoScrollCb = document.getElementById('autoScroll');
const connDot = document.getElementById('connDot');
const statusText = document.getElementById('statusText');
const targetInfo = document.getElementById('targetInfo');
const riskBadge = document.getElementById('riskBadge');
const statFindings = document.getElementById('statFindings');
const statRiskScore = document.getElementById('statRiskScore');
const statEndpoints = document.getElementById('statEndpoints');
const statWorkflowNodes = document.getElementById('statWorkflowNodes');
const statMacros = document.getElementById('statMacros');
const fCritical = document.getElementById('fCritical');
const fHigh = document.getElementById('fHigh');
const fMedium = document.getElementById('fMedium');
const fLow = document.getElementById('fLow');
const workflowGraph = document.getElementById('workflowGraph');
const screenshotImg = document.getElementById('screenshotImg');
const screenshotPanel = document.getElementById('screenshotPanel');
const eventCountEl = document.getElementById('eventCount');

let sevCounts = { critical:0, high:0, medium:0, low:0 };
let endpoints = new Set();
let workflowNodes = 0;
let macros = 0;
let eventCount = 0;
let targetUrl = '';

ws.onopen = () => { connDot.className='conn-dot on'; statusText.textContent='Connected'; };
ws.onclose = () => { connDot.className='conn-dot off'; statusText.textContent='Disconnected'; };
ws.onmessage = (msg) => {
  try { handleEvent(JSON.parse(msg.data)); }
  catch(e){ console.error('parse error', e); }
};

function handleEvent(ev) {
  eventCount++;
  eventCountEl.textContent = eventCount + ' events';
  const d = ev.data || {};
  switch(ev.type) {
    case 'navigate':
      addLog(ev);
      targetUrl = d.url || targetUrl;
      targetInfo.textContent = targetUrl;
      workflowNodes++;
      updateStats();
      updateGraph();
      break;
    case 'finding':
      addLog(ev);
      if (d.severity) {
        const s = d.severity.toLowerCase();
        if (sevCounts[s] !== undefined) sevCounts[s]++;
      }
      if (d.endpoint) endpoints.add(d.endpoint);
      updateStats();
      break;
    case 'tool_call':
      addLog(ev);
      break;
    case 'model_update':
      addLog(ev);
      break;
    case 'risk_change':
      addLog(ev);
      const score = d.score || '--';
      const level = (d.level || '').toLowerCase();
      statRiskScore.textContent = score;
      const colors = { critical:'var(--critical)', high:'var(--high)', medium:'var(--medium)', low:'var(--low)' };
      const c = colors[level] || 'var(--text-muted)';
      riskBadge.textContent = 'Risk: ' + (level ? level.toUpperCase() : '--') + ' (' + score + ')';
      riskBadge.style.background = c + '30';
      riskBadge.style.color = c;
      break;
    case 'screenshot':
      if (d.base64) { screenshotImg.src = d.base64; screenshotPanel.style.display='block'; }
      break;
    case 'session':
      addLog(ev);
      if (d.action === 'macro_record_stop' || d.action === 'macro_saved') { macros++; updateStats(); }
      break;
    case 'status':
      statusText.textContent = d.message || statusText.textContent;
      break;
    case 'error':
      addLog(ev);
      break;
  }
}

function addLog(ev) {
  const row = document.createElement('div');
  row.className = 'log-entry';

  const time = document.createElement('span');
  time.className = 'time';
  const t = ev.timestamp ? new Date(ev.timestamp) : new Date();
  time.textContent = t.toLocaleTimeString();
  row.appendChild(time);

  const badge = document.createElement('span');
  badge.className = 'type-badge badge-' + ev.type;
  badge.textContent = ev.type.replace(/_/g, ' ');
  row.appendChild(badge);

  const msg = document.createElement('span');
  msg.className = 'msg';
  const d = ev.data || {};
  switch(ev.type) {
    case 'navigate': msg.textContent = d.url + ' — ' + (d.title || ''); break;
    case 'finding': msg.textContent = '[' + d.severity + '] ' + (d.type || 'finding') + ' at ' + (d.endpoint || '?'); break;
    case 'tool_call':
      let args = '';
      if (d.args) { try { args = JSON.stringify(d.args).substring(0,80); } catch(e) { args = ''; } }
      msg.textContent = '\u2192 ' + (d.name || '?') + ' ' + args + ' (iter ' + (d.iteration || '?') + ')';
      break;
    case 'model_update': msg.textContent = 'Section updated: ' + (d.section || '?'); break;
    case 'risk_change': msg.textContent = 'Risk: ' + (d.score || '?') + ' — ' + (d.level || '?'); break;
    case 'session': msg.textContent = (d.action || '?') + ' — ' + (d.id || ''); break;
    case 'error': msg.textContent = '\u2717 ' + (d.message || '?'); break;
    case 'status': msg.textContent = d.message || ''; break;
    default: msg.textContent = JSON.stringify(d); break;
  }
  row.appendChild(msg);
  logContent.appendChild(row);
  if (autoScrollCb.checked) logContent.scrollTop = logContent.scrollHeight;
}

function updateStats() {
  statFindings.textContent = Object.values(sevCounts).reduce((a,b)=>a+b, 0);
  fCritical.textContent = sevCounts.critical;
  fHigh.textContent = sevCounts.high;
  fMedium.textContent = sevCounts.medium;
  fLow.textContent = sevCounts.low;
  statEndpoints.textContent = endpoints.size;
  statWorkflowNodes.textContent = workflowNodes;
  statMacros.textContent = macros;
}

function updateGraph() {
  workflowGraph.textContent = 'Nodes: ' + workflowNodes + '\nTarget: ' + (targetUrl || '...') + '\nEndpoints: ' + endpoints.size;
}
</script>
</body>
</html>
