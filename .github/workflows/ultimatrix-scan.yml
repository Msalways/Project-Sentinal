name: Ultimatrix Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1' # weekly on Monday
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL to scan'
        required: true
      mode:
        description: 'Scan mode'
        default: 'toolbox'
        type: choice
        options:
          - toolbox
          - assault
          - interact

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx vitest run --reporter=verbose
        timeout-minutes: 10
      - run: npx tsc --noEmit
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  scan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Ultimatrix Scan
        run: |
          node dist/cli/index.js run \
            -t ${{ github.event.inputs.target }} \
            -o ./scan-results \
            --format sarif
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: scan-results/
      - name: Upload SARIF to GitHub CodeQL
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-results/
          category: ultimatrix
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ultimatrix .
      - name: Test Docker image
        run: docker run --rm ultimatrix --help
