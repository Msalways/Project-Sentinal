id: dir-enum
info:
  name: Directory Enumeration
  severity: medium
  description: Checks for exposed directories and sensitive files
  tags: enum,discovery

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.git/"
      - "{{BaseURL}}/.svn/"
      - "{{BaseURL}}/.DS_Store"
      - "{{BaseURL}}/backup/"
      - "{{BaseURL}}/config/"
      - "{{BaseURL}}/logs/"
      - "{{BaseURL}}/node_modules/"
      - "{{BaseURL}}/vendor/"
      - "{{BaseURL}}/wp-admin/"
      - "{{BaseURL}}/actuator/"
      - "{{BaseURL}}/swagger-ui/"
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/.well-known/"
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/dashboard/"
    matchers:
      - type: status
        status:
          - 200
          - 201
          - 204
          - 401
          - 403
