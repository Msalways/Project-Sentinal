id: xss-test
info:
  name: Reflected XSS Detection
  severity: medium
  description: Checks for reflected XSS in common parameters
  tags: xss,injection

requests:
  - method: GET
    path:
      - "{{BaseURL}}/?q=<script>alert(1)</script>"
      - "{{BaseURL}}/?search=%3Cscript%3Ealert(1)%3C/script%3E"
      - "{{BaseURL}}/?name=%3Cimg%20src=x%20onerror=alert(1)%3E"
    matchers:
      - type: word
        words:
          - "<script>alert(1)</script>"
          - "<img src=x onerror=alert(1)>"
        part: body
