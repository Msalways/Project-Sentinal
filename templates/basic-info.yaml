id: basic-info
info:
  name: Basic Information Disclosure
  severity: medium
  description: Checks for common information disclosure paths
  tags: info,disclosure

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/debug"
    matchers:
      - type: status
        status:
          - 200
          - 201
          - 204
